<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectorAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      padding: 16px 20px;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status span { font-size: 12px; }
    .content { padding: 16px 20px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .value { font-size: 24px; font-weight: 700; color: #1e293b; }
    .stat-box .label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .network-list { margin-bottom: 16px; }
    .network-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .network-item .left { display: flex; align-items: center; gap: 10px; }
    .network-item .icon { font-size: 20px; }
    .network-item .name { font-size: 13px; font-weight: 500; }
    .network-item .count { font-size: 11px; color: #64748b; }
    .toggle {
      width: 36px;
      height: 20px;
      background: #e2e8f0;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #22c55e; }
    .toggle::after {
      content: '';
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: white; color: #374151; border: 1px solid #e2e8f0; }
    .btn-secondary:hover { background: #f1f5f9; }
    .btn-extract { background: #10b981; color: white; }
    .btn-extract:hover { background: #059669; }
    .footer {
      padding: 12px 20px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 ProspectorAI</h1>
    <p>Automatización Multi-Red</p>
    <div class="status">
      <div class="status-dot"></div>
      <span>Activo - Procesando tareas</span>
    </div>
  </div>

  <div class="content">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="value" id="todaySent">0</div>
        <div class="label">Enviados hoy</div>
      </div>
      <div class="stat-box">
        <div class="value" id="todayReplies">0</div>
        <div class="label">Respuestas hoy</div>
      </div>
      <div class="stat-box">
        <div class="value" id="queueSize">0</div>
        <div class="label">En cola</div>
      </div>
      <div class="stat-box">
        <div class="value" id="dailyLimit">30/50</div>
        <div class="label">Límite diario</div>
      </div>
    </div>

    <div class="network-list">
      <div class="network-item">
        <div class="left">
          <span class="icon">💼</span>
          <div>
            <div class="name">LinkedIn</div>
            <div class="count">12/30 acciones hoy</div>
          </div>
        </div>
        <div class="toggle active" data-network="linkedin"></div>
      </div>
      <div class="network-item">
        <div class="left">
          <span class="icon">🟢</span>
          <div>
            <div class="name">Fiverr</div>
            <div class="count">5/20 acciones hoy</div>
          </div>
        </div>
        <div class="toggle active" data-network="fiverr"></div>
      </div>
      <div class="network-item">
        <div class="left">
          <span class="icon">🐦</span>
          <div>
            <div class="name">Twitter</div>
            <div class="count">8/50 acciones hoy</div>
          </div>
        </div>
        <div class="toggle active" data-network="twitter"></div>
      </div>
      <div class="network-item">
        <div class="left">
          <span class="icon">📸</span>
          <div>
            <div class="name">Instagram</div>
            <div class="count">0/40 acciones hoy</div>
          </div>
        </div>
        <div class="toggle" data-network="instagram"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-extract" id="extractBtn">🔍 Extraer Perfil Actual</button>
      <button class="btn btn-primary" id="addToQueueBtn">📥 Añadir a Cola de Prospección</button>
      <button class="btn btn-secondary" id="openDashboardBtn">📊 Abrir Dashboard</button>
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Abrir Panel Completo →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
