<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProspectorAI - Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; padding: 20px; }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1e293b; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; line-height: 1.5; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 24px; background: #3b82f6; color: white; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No te preocupes, tus campañas siguen ejecutándose. Vuelve cuando tengas conexión para ver los resultados.</p>
    <a href="/" class="btn" onclick="location.reload()">Reintentar</a>
  </div>
</body>
</html>
